version: "3.9"

services:
  web-app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8090
    depends_on:
      - payments-service

  payments-service:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run server:dev"
    ports:
      - "8090:8090"
    environment:
      - HOST=0.0.0.0
      - PORT=8090
      - TRON_MODE=prod
      - TRON_EVENT_API_URL=http://tron-event:8060
      - TRON_FULL_NODE_URL=http://tron-fullnode:8090
      - TRON_SOLIDITY_NODE_URL=http://tron-solidity:8091
      - TRON_USDT_CONTRACT=TXLAQ63Xg1NAzckPwKHvzw7CSEmLMEqcdj
      - TRON_CONFIRMATIONS_REQUIRED=20
      - INVOICE_EXPIRY_MINUTES=30
      - ADMIN_EMAIL=admin@bitrium.local
      - ADMIN_PASSWORD=Admin12345!
    depends_on:
      - postgres
      - redis

  tron-monitor:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run server:dev"
    environment:
      - HOST=0.0.0.0
      - PORT=8090
      - TRON_MODE=prod
      - TRON_EVENT_API_URL=http://tron-event:8060
      - TRON_FULL_NODE_URL=http://tron-fullnode:8090
      - TRON_SOLIDITY_NODE_URL=http://tron-solidity:8091
    depends_on:
      - tron-fullnode
      - tron-event

  signer-sweeper:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "echo 'Run isolated signer/sweeper service here' && tail -f /dev/null"
    environment:
      - KEY_ENCRYPTION_SECRET=change_me
    depends_on:
      - payments-service

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=bitrium
      - POSTGRES_PASSWORD=bitrium
      - POSTGRES_DB=bitrium_payments
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Self-hosted TRON infrastructure placeholders (replace images/config in production)
  tron-fullnode:
    image: alpine:3.20
    command: ["sh", "-c", "echo 'attach tron fullnode here' && tail -f /dev/null"]

  tron-solidity:
    image: alpine:3.20
    command: ["sh", "-c", "echo 'attach tron solidity node here' && tail -f /dev/null"]

  tron-event:
    image: alpine:3.20
    command: ["sh", "-c", "echo 'attach tron event server here' && tail -f /dev/null"]

volumes:
  pgdata:
