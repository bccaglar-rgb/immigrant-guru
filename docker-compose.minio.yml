# MinIO — S3-compatible object storage for Bitrium cold candle archive.
# Usage: docker compose -f docker-compose.minio.yml up -d
#
# Console: http://localhost:9001  (minioadmin / minioadmin)
# API:     http://localhost:9000
#
# Bucket "bitrium-candles" is auto-created by the Parquet exporter on first write.

services:
  minio:
    image: minio/minio:latest
    container_name: bitrium-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  minio_data:
    driver: local
