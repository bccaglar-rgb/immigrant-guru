name: Fix Server

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts

      - name: Fix SSH keys and check depth cache
        run: |
          ssh root@${{ secrets.DROPLET_IP }} 'bash -s' << 'FIXEOF'
            echo "=== Fix SSH keys ==="
            cp /root/.ssh/authorized_keys /root/.ssh/authorized_keys.bak
            cat > /tmp/new_keys << 'KEYS'
            ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMMCiz9+6wQNPyg4jz+0/S4prFTy7bnnaC/F28AwbELW innersky-digitalocean
            ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIH2v1pLEFr/EDdZ1iwCczGdULMnIPhguE2j+SlISRkg1 bccaglar-rgb
          KEYS
            sed -i 's/^[[:space:]]*//' /tmp/new_keys
            cat /root/.ssh/authorized_keys /tmp/new_keys | sort -u > /tmp/merged_keys
            cp /tmp/merged_keys /root/.ssh/authorized_keys
            chmod 600 /root/.ssh/authorized_keys
            echo "Keys in authorized_keys:"
            wc -l /root/.ssh/authorized_keys
            cat /root/.ssh/authorized_keys

            echo ""
            echo "=== Check services ==="
            pg_isready && echo "PostgreSQL OK" || echo "PostgreSQL DOWN"
            redis-cli ping || echo "Redis DOWN"

            echo ""
            echo "=== PM2 status ==="
            pm2 list

            echo ""
            echo "=== Check depth cache in Redis ==="
            redis-cli keys "mdc:depth:*" | head -5
            redis-cli get "mdc:depth:BTCUSDT" | head -1 || echo "No BTCUSDT depth"

            echo ""
            echo "=== Market-hub logs ==="
            pm2 logs market-hub --lines 15 --nostream 2>/dev/null | tail -15

            echo ""
            echo "=== Health check ==="
            curl -sf http://127.0.0.1:8090/api/health && echo "" && echo "HEALTHY" || echo "UNHEALTHY"
          FIXEOF
