name: Fix Server

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts

      - name: Fix SSH keys and depth cache
        run: |
          # Write SSH keys directly to server — no heredoc indentation issues
          ssh root@${{ secrets.DROPLET_IP }} 'printf "%s\n" "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMMCiz9+6wQNPyg4jz+0/S4prFTy7bnnaC/F28AwbELW innersky-digitalocean" "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIH2v1pLEFr/EDdZ1iwCczGdULMnIPhguE2j+SlISRkg1 bccaglar-rgb" > /tmp/extra_keys'

          ssh root@${{ secrets.DROPLET_IP }} 'bash -s' << 'FIXEOF'
            # 1. Fix authorized_keys — append new keys, keep existing CI key
            echo "" >> /root/.ssh/authorized_keys
            cat /tmp/extra_keys >> /root/.ssh/authorized_keys
            # Remove blank lines and deduplicate
            grep -v '^[[:space:]]*$' /root/.ssh/authorized_keys | awk '!seen[$0]++' > /tmp/ak_clean
            cp /tmp/ak_clean /root/.ssh/authorized_keys
            chmod 600 /root/.ssh/authorized_keys
            chown root:root /root/.ssh/authorized_keys
            echo "authorized_keys lines:"
            wc -l /root/.ssh/authorized_keys
            echo "Key fingerprints:"
            while read -r line; do echo "$line" | ssh-keygen -l -f - 2>/dev/null || echo "invalid: $line"; done < /root/.ssh/authorized_keys
            # Ensure no carriage returns (Windows line endings) in authorized_keys
            sed -i 's/\r$//' /root/.ssh/authorized_keys
            # Ensure sshd can read keys
            chmod 700 /root/.ssh
            chmod 600 /root/.ssh/authorized_keys
            chown -R root:root /root/.ssh
            # Debug: show hex of first key line
            head -1 /root/.ssh/authorized_keys | xxd | head -3
            # Check /root permissions (must not be group/world writable for sshd)
            echo "=== Permissions ==="
            ls -la / | grep root
            ls -la /root/ | grep ssh
            ls -la /root/.ssh/
            # Fix /root permissions if needed
            chmod 755 /root
            chmod 700 /root/.ssh
            # Check sshd auth log
            echo "=== Auth log ==="
            tail -20 /var/log/auth.log 2>/dev/null | grep -i "ssh\|key\|auth" | tail -10
            # Check ALL sshd config sources
            echo "=== Main sshd_config ==="
            grep -n -E "Include|AuthorizedKeysFile|PubkeyAuthentication|PermitRootLogin|PasswordAuthentication" /etc/ssh/sshd_config | grep -v "^#"
            echo "=== sshd_config.d/ files ==="
            ls -la /etc/ssh/sshd_config.d/ 2>/dev/null || echo "No sshd_config.d"
            for f in /etc/ssh/sshd_config.d/*.conf; do
              if [ -f "$f" ]; then
                echo "--- $f ---"
                cat "$f"
              fi
            done
            echo "=== cloud-init sshd ==="
            cat /etc/ssh/sshd_config.d/50-cloud-init.conf 2>/dev/null || echo "No cloud-init sshd"

            # Force PubkeyAuthentication in ALL sshd config files (main + config.d overrides)
            for f in /etc/ssh/sshd_config.d/*.conf /etc/ssh/sshd_config; do
              if [ -f "$f" ]; then
                echo "Fixing PubkeyAuthentication in $f"
                sed -i 's/^PubkeyAuthentication no/PubkeyAuthentication yes/' "$f"
                sed -i 's/^#PubkeyAuthentication.*/PubkeyAuthentication yes/' "$f"
              fi
            done
            # Ensure main config has PubkeyAuthentication yes if not present at all
            grep -q "^PubkeyAuthentication" /etc/ssh/sshd_config || echo "PubkeyAuthentication yes" >> /etc/ssh/sshd_config
            # Remove any PasswordAuthentication-only enforcement in config.d
            for f in /etc/ssh/sshd_config.d/*.conf; do
              if [ -f "$f" ]; then
                # If file only enforces password auth without pubkey, add pubkey
                if grep -q "PasswordAuthentication" "$f" && ! grep -q "^PubkeyAuthentication yes" "$f"; then
                  echo "PubkeyAuthentication yes" >> "$f"
                  echo "Added PubkeyAuthentication yes to $f"
                fi
              fi
            done

            # Restart sshd
            systemctl restart sshd || service ssh restart || true
            echo "sshd restarted"

            # Verify final effective config
            echo "=== Effective sshd settings ==="
            sshd -T 2>/dev/null | grep -E "pubkeyauthentication|authorizedkeysfile|permitrootlogin" || true

            # Show all config.d files after fix
            echo "=== Post-fix sshd_config.d/ ==="
            for f in /etc/ssh/sshd_config.d/*.conf; do
              if [ -f "$f" ]; then
                echo "--- $f ---"
                cat "$f"
              fi
            done

            # 2. Create admin user via API signup then promote to ADMIN
            echo ""
            echo "=== Create admin user ==="
            # Signup
            SIGNUP=$(curl -sf -X POST http://127.0.0.1:8090/api/auth/signup \
              -H "Content-Type: application/json" \
              -d '{"email":"bccaglar@gmail.com","password":"Cagdas1907?"}' 2>&1)
            echo "Signup result: $SIGNUP"

            # Promote to ADMIN in DB
            PGPASSWORD=$(grep DB_PASSWORD /var/www/bitrium/.env 2>/dev/null | cut -d= -f2) \
              psql -h 127.0.0.1 -U bitrium_app -d bitrium_db \
              -c "UPDATE users SET role='ADMIN' WHERE email='bccaglar@gmail.com';" 2>/dev/null || \
              sudo -u postgres psql -d bitrium_db \
              -c "UPDATE users SET role='ADMIN' WHERE email='bccaglar@gmail.com';" 2>/dev/null
            echo "Promoted to ADMIN"

            # Verify
            PGPASSWORD=$(grep DB_PASSWORD /var/www/bitrium/.env 2>/dev/null | cut -d= -f2) \
              psql -h 127.0.0.1 -U bitrium_app -d bitrium_db \
              -c "SELECT id, email, role FROM users;" 2>/dev/null || \
              sudo -u postgres psql -d bitrium_db \
              -c "SELECT id, email, role FROM users;" 2>/dev/null

            echo ""
            echo "=== Restart market-hub and server ==="
            cd /var/www/bitrium
            pm2 restart all --update-env 2>/dev/null || true
            sleep 5
            pm2 list

            echo ""
            echo "=== Check market-hub logs ==="
            pm2 logs market-hub --lines 10 --nostream 2>/dev/null || true

            echo ""
            echo "=== Check depth cache ==="
            sleep 10
            curl -sf http://127.0.0.1:8090/api/market/live?symbol=BTCUSDT'&'exchange=binance 2>/dev/null | python3 -c "
import sys,json
try:
  d=json.load(sys.stdin)
  print('orderbookSource:', d.get('orderbookSource'))
  print('feedSource:', d.get('feedSource'))
  print('price:', d.get('lastTradePrice'))
except: print('Failed to parse')
" || echo "Market API unavailable"

            echo ""
            echo "=== Health ==="
            curl -sf http://127.0.0.1:8090/api/health && echo " HEALTHY" || echo "UNHEALTHY"
          FIXEOF

      - name: Test SSH access
        run: |
          ssh -o ConnectTimeout=10 -o BatchMode=yes root@${{ secrets.DROPLET_IP }} 'echo "SSH pubkey auth working"; whoami; sshd -T | grep pubkeyauthentication'
