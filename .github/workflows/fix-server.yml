name: Fix Server

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts

      - name: Debug and fix server
        run: |
          ssh root@${{ secrets.DROPLET_IP }} << 'FIXEOF'
            echo "=== PM2 status ==="
            pm2 list

            echo "=== Check .env files ==="
            ls -la /root/bitrium/.env 2>/dev/null && echo "Found /root/bitrium/.env" || echo "NOT found /root/bitrium/.env"
            ls -la /var/www/bitrium/.env 2>/dev/null && echo "Found /var/www/bitrium/.env" || echo "NOT found /var/www/bitrium/.env"

            echo "=== Check paths ==="
            ls -la /var/www/bitrium/server/src/index.ts 2>/dev/null && echo "server code exists at /var/www" || echo "NO server code at /var/www"
            ls -la /root/bitrium/server/src/index.ts 2>/dev/null && echo "server code exists at /root" || echo "NO server code at /root"

            echo "=== PM2 process details ==="
            pm2 describe market-worker 2>/dev/null | grep -E "exec cwd|script|status|restart" | head -10

            echo "=== Copy .env if missing ==="
            if [ -f /root/bitrium/.env ] && [ ! -f /var/www/bitrium/.env ]; then
              cp /root/bitrium/.env /var/www/bitrium/.env
              echo "✓ Copied .env to /var/www/bitrium/"
            elif [ ! -f /root/bitrium/.env ] && [ ! -f /var/www/bitrium/.env ]; then
              echo "ERROR: No .env found anywhere!"
              find / -name ".env" -path "*/bitrium*" 2>/dev/null
            else
              echo ".env already exists at /var/www/bitrium/"
            fi

            echo "=== Symlink .env for safety ==="
            if [ -f /var/www/bitrium/.env ] && [ ! -f /root/bitrium/.env ]; then
              ln -sf /var/www/bitrium/.env /root/bitrium/.env
            fi

            echo "=== Add SSH keys ==="
            grep -q "innersky-digitalocean" /root/.ssh/authorized_keys 2>/dev/null || echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMMCiz9+6wQNPyg4jz+0/S4prFTy7bnnaC/F28AwbELW innersky-digitalocean" >> /root/.ssh/authorized_keys
            grep -q "bccaglar-rgb" /root/.ssh/authorized_keys 2>/dev/null || echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIH2v1pLEFr/EDdZ1iwCczGdULMnIPhguE2j+SlISRkg1 bccaglar-rgb" >> /root/.ssh/authorized_keys
            echo "✓ SSH keys ensured"

            echo "=== PM2 logs (last errors) ==="
            pm2 logs market-worker --lines 20 --nostream 2>/dev/null | tail -20

            echo "=== Restart PM2 from correct path ==="
            cd /var/www/bitrium
            pm2 delete all 2>/dev/null || true
            pm2 start ecosystem.config.cjs
            pm2 save

            echo "=== Wait and check ==="
            sleep 15
            pm2 list
            pm2 logs market-worker --lines 10 --nostream 2>/dev/null | tail -10

            echo "=== Health check ==="
            for i in $(seq 1 10); do
              if curl -sf http://127.0.0.1:8090/api/health > /dev/null 2>&1; then
                echo "✓ Health check PASSED"
                curl -s http://127.0.0.1:8090/api/health
                exit 0
              fi
              echo "Waiting... ($i/10)"
              sleep 3
            done
            echo "✗ Health check failed after 30s"
            pm2 logs market-worker --lines 30 --nostream 2>/dev/null | tail -30
          FIXEOF
