name: Fix Server

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts

      - name: Fix SSH keys and depth cache
        run: |
          # Write SSH keys directly to server — no heredoc indentation issues
          ssh root@${{ secrets.DROPLET_IP }} 'printf "%s\n" "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMMCiz9+6wQNPyg4jz+0/S4prFTy7bnnaC/F28AwbELW innersky-digitalocean" "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIH2v1pLEFr/EDdZ1iwCczGdULMnIPhguE2j+SlISRkg1 bccaglar-rgb" > /tmp/extra_keys'

          ssh root@${{ secrets.DROPLET_IP }} 'bash -s' << 'FIXEOF'
            # 1. Fix authorized_keys — append new keys, keep existing CI key
            echo "" >> /root/.ssh/authorized_keys
            cat /tmp/extra_keys >> /root/.ssh/authorized_keys
            # Remove blank lines and deduplicate
            grep -v '^[[:space:]]*$' /root/.ssh/authorized_keys | awk '!seen[$0]++' > /tmp/ak_clean
            cp /tmp/ak_clean /root/.ssh/authorized_keys
            chmod 600 /root/.ssh/authorized_keys
            chown root:root /root/.ssh/authorized_keys
            echo "authorized_keys lines:"
            wc -l /root/.ssh/authorized_keys
            echo "Key fingerprints:"
            while read -r line; do echo "$line" | ssh-keygen -l -f - 2>/dev/null || echo "invalid: $line"; done < /root/.ssh/authorized_keys
            # Ensure no carriage returns (Windows line endings) in authorized_keys
            sed -i 's/\r$//' /root/.ssh/authorized_keys
            # Ensure sshd can read keys
            chmod 700 /root/.ssh
            chmod 600 /root/.ssh/authorized_keys
            chown -R root:root /root/.ssh
            # Debug: show hex of first key line
            head -1 /root/.ssh/authorized_keys | xxd | head -3
            # Check /root permissions (must not be group/world writable for sshd)
            echo "=== Permissions ==="
            ls -la / | grep root
            ls -la /root/ | grep ssh
            ls -la /root/.ssh/
            # Fix /root permissions if needed
            chmod 755 /root
            chmod 700 /root/.ssh
            # Check sshd auth log
            echo "=== Auth log ==="
            tail -20 /var/log/auth.log 2>/dev/null | grep -i "ssh\|key\|auth" | tail -10
            # Check ALL sshd config sources
            echo "=== Main sshd_config ==="
            grep -n -E "Include|AuthorizedKeysFile|PubkeyAuthentication|PermitRootLogin|PasswordAuthentication" /etc/ssh/sshd_config | grep -v "^#"
            echo "=== sshd_config.d/ files ==="
            ls -la /etc/ssh/sshd_config.d/ 2>/dev/null || echo "No sshd_config.d"
            for f in /etc/ssh/sshd_config.d/*.conf; do
              if [ -f "$f" ]; then
                echo "--- $f ---"
                cat "$f"
              fi
            done
            echo "=== cloud-init sshd ==="
            cat /etc/ssh/sshd_config.d/50-cloud-init.conf 2>/dev/null || echo "No cloud-init sshd"

            # Fix: ensure PubkeyAuthentication yes everywhere
            sed -i 's/^PubkeyAuthentication no/PubkeyAuthentication yes/' /etc/ssh/sshd_config
            sed -i 's/^#PubkeyAuthentication.*/PubkeyAuthentication yes/' /etc/ssh/sshd_config
            grep -q "^PubkeyAuthentication" /etc/ssh/sshd_config || echo "PubkeyAuthentication yes" >> /etc/ssh/sshd_config
            # Fix in ALL config.d files
            for f in /etc/ssh/sshd_config.d/*.conf; do
              if [ -f "$f" ]; then
                sed -i 's/^PubkeyAuthentication no/PubkeyAuthentication yes/' "$f"
              fi
            done
            # If PasswordAuthentication only, enable pubkey
            grep -rn "PubkeyAuthentication" /etc/ssh/sshd_config.d/ 2>/dev/null || true

            # Restart sshd
            systemctl restart sshd || service ssh restart || true
            echo "sshd restarted"

            # Verify final effective config
            echo "=== Effective sshd settings ==="
            sshd -T 2>/dev/null | grep -E "pubkeyauthentication|authorizedkeysfile|permitrootlogin" || true

            # 2. Check depth cache source issue
            echo ""
            echo "=== Depth cache source ==="
            redis-cli get "mdc:depth:BTCUSDT" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print('source:', d.get('source'))" 2>/dev/null || echo "No BTCUSDT depth"

            # 3. Check if Binance book_snapshot events reach bridge
            echo ""
            echo "=== Market-hub logs (book_snapshot) ==="
            pm2 logs market-hub --lines 50 --nostream 2>/dev/null | grep -i "book_snapshot\|depth\|mdc:depth\|BINANCE.*snapshot" | tail -10

            # 4. Health
            echo ""
            curl -sf http://127.0.0.1:8090/api/health && echo " HEALTHY" || echo "UNHEALTHY"
          FIXEOF
