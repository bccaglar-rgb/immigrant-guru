name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          # Upload frontend build (Nginx serves from /var/www/bitrium/dist/)
          rsync -avz --delete dist/ root@${{ secrets.DROPLET_IP }}:/var/www/bitrium/dist/

          # Upload server code (exclude data/ — now lives in PostgreSQL)
          rsync -avz --delete --exclude='data/' server/ root@${{ secrets.DROPLET_IP }}:/var/www/bitrium/server/

          # Upload shared src (server imports from src/)
          rsync -avz --delete src/ root@${{ secrets.DROPLET_IP }}:/var/www/bitrium/src/

          # Upload config files
          rsync -avz package.json package-lock.json tsconfig.json ecosystem.config.cjs root@${{ secrets.DROPLET_IP }}:/var/www/bitrium/

          # Upload deploy configs
          rsync -avz deploy/ root@${{ secrets.DROPLET_IP }}:/var/www/bitrium/deploy/

          # Debug: verify files on server after rsync
          echo "=== Verifying dist on server ==="
          ssh root@${{ secrets.DROPLET_IP }} "ls -la /var/www/bitrium/dist/assets/index-*.js /var/www/bitrium/dist/assets/Pricing*.js /var/www/bitrium/dist/index.html 2>/dev/null; echo '---'; cat /var/www/bitrium/dist/index.html | grep -o 'index-[^\"]*\.js' | head -1; echo '---'; readlink -f /var/www/bitrium/dist; echo '---'; stat /var/www/bitrium/dist/index.html | grep Modify"

          # Install deps, run DB migrations if needed, zero-downtime reload
          ssh root@${{ secrets.DROPLET_IP }} << 'EOF'
            cd /var/www/bitrium

            # Install production dependencies
            npm ci --omit=dev

            # Run schema migration (idempotent — CREATE IF NOT EXISTS)
            PGPASSWORD="${DB_PASSWORD}" psql -U bitrium_app -d bitrium_db -f server/src/db/schema.sql || true

            # Update Nginx config if changed, then reload
            if [ -f deploy/nginx/bitrium.conf ]; then
              cp deploy/nginx/bitrium.conf /etc/nginx/sites-available/bitrium 2>/dev/null || true
              nginx -t 2>/dev/null && systemctl reload nginx 2>/dev/null || echo "Nginx reload skipped"
            fi

            # Zero-downtime reload: PM2 restarts workers one by one
            pm2 reload ecosystem.config.cjs || pm2 start ecosystem.config.cjs
            pm2 save

            # Health check — wait for backend to be ready
            for i in $(seq 1 10); do
              if curl -sf http://127.0.0.1:8090/api/health > /dev/null 2>&1; then
                echo "Health check passed"
                exit 0
              fi
              echo "Waiting for backend... ($i/10)"
              sleep 2
            done
            echo "WARNING: Health check did not pass within 20s"
          EOF
