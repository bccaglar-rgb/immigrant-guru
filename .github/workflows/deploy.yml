name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: false
          command_timeout: 20m
          script: |
            REPO=/opt/app/immigrant-guru
            cd "$REPO"

            echo "==> Pull latest"
            git fetch --all --prune
            git reset --hard origin/main

            echo "==> Debug: directory listing"
            ls -la "$REPO/"
            echo "---"
            ls -la "$REPO/apps/" 2>/dev/null && echo "flat apps/ exists" || echo "flat apps/ missing"
            ls -la "$REPO/Immigrant AI/" 2>/dev/null && echo "nested Immigrant AI/ exists" || echo "nested Immigrant AI/ missing"
            echo "==> End debug"
