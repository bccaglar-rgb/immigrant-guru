name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dependency audit
        run: |
          cd "Immigrant AI/apps/web" && npm audit --production --audit-level=high || true
          cd "Immigrant AI/apps/api" && pip install --quiet pip-audit && pip-audit --desc || true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 20m
          script: |
            REPO=/opt/app/immigrant-guru
            cd "$REPO"

            echo "==> Pull latest code"
            git fetch --all --prune
            git reset --hard origin/main

            echo "==> Sync app files from Immigrant AI/ subtree (rsync --delete removes stale files)"
            rm -rf /tmp/immigrant-ai-sync && mkdir -p /tmp/immigrant-ai-sync
            git archive HEAD "Immigrant AI/" | tar -x --strip-components=1 -C /tmp/immigrant-ai-sync/
            rsync -a --delete \
              --exclude='.next' --exclude='node_modules' --exclude='.venv' \
              /tmp/immigrant-ai-sync/ "$REPO/"
            rm -rf /tmp/immigrant-ai-sync

            echo "==> Web build"
            cd "$REPO/apps/web"
            rm -rf .next
            npm ci --no-audit --no-fund
            npm run build

            echo "==> API deps"
            cd "$REPO/apps/api"
            test -d .venv || python3.12 -m venv .venv
            . .venv/bin/activate
            pip install -q --upgrade pip
            pip install -q -e .
            deactivate

            echo "==> Worker deps"
            cd "$REPO/apps/worker"
            test -d .venv || python3.12 -m venv .venv
            . .venv/bin/activate
            pip install -q --upgrade pip
            pip install -q -e .
            deactivate

            echo "==> Reload"
            cd "$REPO"
            pm2 reload ecosystem.config.cjs --update-env
            pm2 save

            echo "==> Health check"
            sleep 8
            curl -fsS http://127.0.0.1:3000/ > /dev/null && echo "web OK" || echo "web FAIL"
            curl -fsS https://immigrant.guru/api/v1/health -k > /dev/null && echo "api OK" || echo "api FAIL"
            echo "Done."
