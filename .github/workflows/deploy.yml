name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dependency audit
        run: |
          cd "Immigrant AI/apps/web" && npm audit --production --audit-level=high || true
          cd "Immigrant AI/apps/api" && pip install --quiet pip-audit && pip-audit --desc || true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_LIVE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_LIVE_PUBLISHABLE_KEY }}
          STRIPE_STARTER_PRICE_ID: ${{ secrets.STRIPE_LIVE_STARTER_PRICE_ID }}
          STRIPE_PLUS_PRICE_ID: ${{ secrets.STRIPE_LIVE_PLUS_PRICE_ID }}
          STRIPE_PREMIUM_PRICE_ID: ${{ secrets.STRIPE_LIVE_PREMIUM_PRICE_ID }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_LIVE_WEBHOOK_SECRET }}
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: STRIPE_SECRET_KEY,STRIPE_PUBLISHABLE_KEY,STRIPE_STARTER_PRICE_ID,STRIPE_PLUS_PRICE_ID,STRIPE_PREMIUM_PRICE_ID,STRIPE_WEBHOOK_SECRET
          script_stop: true
          command_timeout: 20m
          script: |
            REPO=/opt/app/immigrant-guru
            mkdir -p "$REPO"
            cd "$REPO"

            echo "==> Update Stripe live keys in API .env"
            API_ENV="$REPO/apps/api/.env"
            if [ -f "$API_ENV" ]; then
              sed -i "s|^STRIPE_SECRET_KEY=.*|STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY|" "$API_ENV"
              sed -i "s|^STRIPE_PUBLISHABLE_KEY=.*|STRIPE_PUBLISHABLE_KEY=$STRIPE_PUBLISHABLE_KEY|" "$API_ENV"
              sed -i "s|^STRIPE_STARTER_PRICE_ID=.*|STRIPE_STARTER_PRICE_ID=$STRIPE_STARTER_PRICE_ID|" "$API_ENV"
              sed -i "s|^STRIPE_PLUS_PRICE_ID=.*|STRIPE_PLUS_PRICE_ID=$STRIPE_PLUS_PRICE_ID|" "$API_ENV"
              sed -i "s|^STRIPE_PREMIUM_PRICE_ID=.*|STRIPE_PREMIUM_PRICE_ID=$STRIPE_PREMIUM_PRICE_ID|" "$API_ENV"
              sed -i "s|^STRIPE_WEBHOOK_SECRET=.*|STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET|" "$API_ENV"
              echo "Stripe keys updated."
            else
              echo "WARNING: $API_ENV not found — skipping Stripe key update"
            fi

            echo "==> Ensure git repo exists"
            if [ ! -d .git ]; then
              echo "WARNING: .git missing — re-initializing repo from GitHub"
              git init
              git remote add origin https://github.com/bccaglar-rgb/immigrant-guru.git
            fi

            echo "==> Pull latest code"
            git fetch --all --prune
            git reset --hard origin/main

            echo "==> Sync app files from Immigrant AI/ subtree"
            # Purge stale web source files that tar -x cannot delete (only adds/overwrites).
            # Only src/ is removed — .env.local, node_modules, .next, storage stay intact.
            rm -rf "$REPO/apps/web/src"
            git archive HEAD "Immigrant AI/" | tar -x --strip-components=1 -C "$REPO"

            echo "==> Web build"
            cd "$REPO/apps/web"
            rm -rf .next
            npm ci --no-audit --no-fund
            NEXT_PUBLIC_GA_ID=G-4WPW4Z3SY1 npm run build

            echo "==> API deps"
            cd "$REPO/apps/api"
            test -d .venv || python3.12 -m venv .venv
            . .venv/bin/activate
            pip install -q --upgrade pip
            pip install -q -e .

            echo "==> Run DB migrations"
            alembic upgrade head
            deactivate

            echo "==> Worker deps"
            cd "$REPO/apps/worker"
            test -d .venv || python3.12 -m venv .venv
            . .venv/bin/activate
            pip install -q --upgrade pip
            pip install -q -e .
            deactivate

            echo "==> Reload"
            cd "$REPO"
            pm2 reload ecosystem.config.cjs --update-env
            pm2 save

            echo "==> Health check"
            sleep 8
            curl -fsS http://127.0.0.1:3000/ > /dev/null && echo "web OK" || echo "web FAIL"
            curl -fsS http://127.0.0.1:8000/api/v1/health > /dev/null && echo "api OK" || echo "api FAIL"
            echo "Done."
