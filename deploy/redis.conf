# ─────────────────────────────────────────────────────────────
# Redis — Bitrium Production Config (Single Node / Sentinel)
# ─────────────────────────────────────────────────────────────
# For Redis Cluster: use redis-cluster.conf instead
# Deploy: /etc/redis/redis.conf
# ─────────────────────────────────────────────────────────────

# ── Network ──────────────────────────────────────────────────
bind 127.0.0.1
port 6379
protected-mode yes

# ── Auth ─────────────────────────────────────────────────────
# requirepass YOUR_REDIS_PASSWORD
# Uncomment and set in production!

# ── Memory ───────────────────────────────────────────────────
maxmemory 12gb
# allkeys-lru: evict least recently used keys when maxmemory reached
# Safe for cache + queue (BullMQ job state protected by AOF)
maxmemory-policy allkeys-lru

# Memory fragmentation alert threshold
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10

# ── Persistence — AOF (primary, crash safety) ────────────────
appendonly yes
appendfilename "appendonly.aof"
# everysec: flush to disk every second (best balance: perf vs durability)
appendfsync everysec
# Disable AOF rewrite during RDB save to avoid double I/O spike
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ── Persistence — RDB (secondary, fast recovery snapshot) ────
# Save snapshot every 15 min if ≥1 key changed
save 900 1
# Save snapshot every 5 min if ≥10 keys changed
save 300 10
# Save snapshot every 60 sec if ≥10000 keys changed
save 60 10000
dbfilename dump.rdb

# ── Storage paths (use dedicated NVMe disk) ──────────────────
dir /var/lib/redis
# If Redis is on a dedicated disk, set to that mount path:
# dir /mnt/redis-data

# ── Pub/Sub ──────────────────────────────────────────────────
# No limit on pub/sub clients (needed for tick orchestrator)
# Channels: tick:1s, tick:5s, tick:60s, tick:24h
# + market data fanout channels

# ── Slow log ─────────────────────────────────────────────────
slowlog-log-slower-than 10000   # 10ms
slowlog-max-len 128

# ── Logging ──────────────────────────────────────────────────
loglevel notice
logfile /var/log/redis/redis.log

# ── Clients ──────────────────────────────────────────────────
maxclients 10000
tcp-keepalive 300

# ── Latency monitoring ───────────────────────────────────────
latency-monitor-threshold 25    # alert if op > 25ms
latency-tracking yes

# ── Cluster (uncomment for Redis Cluster mode) ───────────────
# cluster-enabled yes
# cluster-config-file nodes.conf
# cluster-node-timeout 5000
