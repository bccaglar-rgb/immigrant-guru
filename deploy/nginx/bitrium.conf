# ── Bitrium Nginx Configuration ────────────────────────────
# Place at: /etc/nginx/sites-available/bitrium
# Enable:   ln -s /etc/nginx/sites-available/bitrium /etc/nginx/sites-enabled/
# Test:     nginx -t && systemctl reload nginx

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=auth_rl:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=api_rl:10m rate=30r/s;

# Upstream: PM2 cluster on port 8090 (3 workers behind one port)
upstream bitrium_backend {
  ip_hash;  # sticky sessions for WebSocket
  server 127.0.0.1:8090;
}

server {
    listen 80;
    server_name bitrium.com www.bitrium.com;
    # Redirect all HTTP → HTTPS (Certbot will add SSL block)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name bitrium.com www.bitrium.com;

    # SSL — managed by Certbot (paths will be filled automatically)
    # ssl_certificate /etc/letsencrypt/live/bitrium.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/bitrium.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Gzip compression ──────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Static assets (Vite build output) ─────────────────
    root /var/www/bitrium/dist;

    # Hashed assets — immutable cache (1 year)
    location /assets/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # favicon, robots.txt, manifest — short cache
    location ~* ^/(favicon\.ico|robots\.txt|manifest\.json)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    # ── WebSocket upgrade ─────────────────────────────────
    location /ws {
        proxy_pass http://bitrium_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keep WS alive for 24 hours
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Auth API — stricter rate limiting ─────────────────
    location ~ ^/api/auth/(login|signup|password-reset) {
        limit_req zone=auth_rl burst=5 nodelay;
        proxy_pass http://bitrium_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── All API routes → PM2 backend ─────────────────────
    location /api/ {
        # limit_req zone=api_rl burst=60 nodelay;  # disabled — SPA self-traffic
        proxy_pass http://bitrium_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Timeouts for long-running API calls
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── SPA fallback — all other routes → index.html ─────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Deny hidden files ─────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Client max body size (for logo uploads etc.) ──────
    client_max_body_size 2m;
}
