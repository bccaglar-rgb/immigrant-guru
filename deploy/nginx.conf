# ─────────────────────────────────────────────────────────────
# Nginx — Bitrium Production Config
# ─────────────────────────────────────────────────────────────
# Deploy: /etc/nginx/sites-available/bitrium
# Enable: ln -s /etc/nginx/sites-available/bitrium /etc/nginx/sites-enabled/
# Test:   nginx -t
# Reload: systemctl reload nginx
#
# Faz 1: api-1 only (single server)
# Faz 2: uncomment api-2 for load balancing
# ─────────────────────────────────────────────────────────────

# ── API upstream (round-robin, stateless HTTP) ────────────────
upstream bitrium_api {
    # Faz 1: single server
    server 127.0.0.1:8090;
    # Faz 2: add second API node:
    # server API_NODE_2_IP:8090;

    keepalive 64;
}

# ── WS Gateway upstream (sticky session — MUST for WebSocket) ─
# ip_hash ensures same client always reaches same WS node
upstream bitrium_ws {
    ip_hash;  # ← sticky session (WebSocket connection persistence)

    server 127.0.0.1:8090;
    # Faz 2: add dedicated WS gateway nodes:
    # server WS_NODE_1_IP:8092;
    # server WS_NODE_2_IP:8092;

    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────
server {
    listen 80;
    server_name bitrium.io www.bitrium.io;
    return 301 https://$host$request_uri;
}

# ── HTTPS main server ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name bitrium.io www.bitrium.io;

    # ── TLS ──────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/bitrium.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bitrium.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Static assets (Vite build) ────────────────────────────
    root /var/www/bitrium/dist;
    index index.html;

    # Serve static files directly (no proxy overhead)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── WebSocket (sticky session — MUST use bitrium_ws upstream) ──
    location /ws {
        proxy_pass http://bitrium_ws;

        # WebSocket upgrade headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Pass real client IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for persistent WS connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 10s;

        # No buffering for real-time data
        proxy_buffering off;
    }

    # ── API routes (round-robin, stateless) ──────────────────
    location /api/ {
        proxy_pass http://bitrium_api;

        proxy_http_version 1.1;
        proxy_set_header Connection "";  # keep-alive to upstream

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_connect_timeout 5s;

        # Rate limit: 100 req/s per IP (DDoS protection)
        limit_req zone=api_limit burst=200 nodelay;
        limit_req_status 429;
    }

    # ── Metrics (internal only — block from public) ───────────
    location /api/metrics {
        # Only allow internal IPs (monitoring server)
        # allow MONITORING_SERVER_IP;
        # deny all;
        proxy_pass http://bitrium_api;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
    }

    # ── SPA fallback (React Router) ───────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── Rate limit zones ─────────────────────────────────────────
# Define in http block (nginx.conf main file):
# http {
#     limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
# }
