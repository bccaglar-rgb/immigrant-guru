# ──────────────────────────────────────────────────────────────────────────
# Bitrium — Production Docker Compose (Faz 1)
# ──────────────────────────────────────────────────────────────────────────
# Services:
#   postgres      — Primary database (PostgreSQL 16)
#   redis         — Cache + pub/sub + BullMQ (Redis 7.2)
#   pgbouncer     — Connection pooler (transaction mode)
#   api           — Node.js API + PM2 (3 workers)
#   nginx         — Reverse proxy + SSL termination
#
# Usage:
#   cp deploy/.env.example deploy/.env          # Fill secrets
#   docker compose -f deploy/docker-compose.yml up -d
#   docker compose -f deploy/docker-compose.yml logs -f api
#
# Scaling (Faz 2+):
#   docker compose -f deploy/docker-compose.yml up -d --scale api=2
#   Uncomment market-hub service below for external hub mode
# ──────────────────────────────────────────────────────────────────────────

name: bitrium

networks:
  backend:
    driver: bridge
    internal: true          # No direct internet access for backend services
  frontend:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_certs:
    driver: local

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [backend]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       ${DB_NAME:-bitrium}
      POSTGRES_USER:     ${DB_USER:-bitrium}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    # PgBouncer connects here on 5433; app connects to PgBouncer on 5432
    command: >
      postgres
        -p 5433
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c wal_level=replica
        -c max_wal_senders=3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bitrium} -p 5433"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PgBouncer ───────────────────────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    networks: [backend]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:    "postgres://${DB_USER:-bitrium}:${DB_PASSWORD}@postgres:5433/${DB_NAME:-bitrium}"
      POOL_MODE:       transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 100
      SERVER_TLS_SSLMODE: disable
    ports:
      - "127.0.0.1:5432:5432"    # Only bind to localhost (not exposed externally)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${DB_USER:-bitrium}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    networks: [backend]
    volumes:
      - redis_data:/data
      - ./redis.conf:/etc/redis/redis.conf:ro
    command: redis-server /etc/redis/redis.conf
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── API (Node.js + PM2 cluster) ─────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    networks: [backend, frontend]
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:        production
      HOST:            0.0.0.0
      PORT:            8090
      # Database — connect via PgBouncer
      DB_HOST:         pgbouncer
      DB_PORT:         5432
      DB_NAME:         ${DB_NAME:-bitrium}
      DB_USER:         ${DB_USER:-bitrium}
      DB_PASSWORD:     ${DB_PASSWORD}
      # Redis
      REDIS_HOST:      redis
      REDIS_PORT:      6379
      # Secrets
      ENCRYPTION_KEY:  ${ENCRYPTION_KEY}
      JWT_SECRET:      ${JWT_SECRET}
      ADMIN_EMAIL:     ${ADMIN_EMAIL:-admin@bitrium.io}
      ADMIN_PASSWORD:  ${ADMIN_PASSWORD}
      # Hub mode (Faz 1: local, Faz 2+: set HUB_EXTERNAL=true and run market-hub separately)
      HUB_EXTERNAL:    ${HUB_EXTERNAL:-false}
      # Bot limits
      MAX_BOTS_PER_USER: ${MAX_BOTS_PER_USER:-50}
      # Tron payments
      TRON_NODE_URL:   ${TRON_NODE_URL:-}
      TRON_WALLET:     ${TRON_WALLET:-}
    ports:
      - "127.0.0.1:8090:8090"    # Nginx proxies to this
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Nginx ───────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    networks: [frontend]
    depends_on:
      - api
    volumes:
      - ./nginx.conf:/etc/nginx/sites-available/bitrium:ro
      - nginx_certs:/etc/letsencrypt:ro
      # Copy to sites-enabled via entrypoint command
    ports:
      - "80:80"
      - "443:443"
    # Enable the site config
    command: >
      sh -c "
        mkdir -p /etc/nginx/sites-enabled &&
        ln -sf /etc/nginx/sites-available/bitrium /etc/nginx/sites-enabled/bitrium &&
        nginx -g 'daemon off;'
      "
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && curl -sf http://localhost/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Prometheus ──────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    networks: [backend, frontend]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"

  # ── Grafana ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    networks: [backend, frontend]
    depends_on: [prometheus]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-bitrium-grafana}
      GF_USERS_ALLOW_SIGN_UP:    "false"
      GF_SERVER_ROOT_URL:        "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    ports:
      - "127.0.0.1:3001:3000"

  # ── Market Hub (Faz 2+ — uncomment when HUB_EXTERNAL=true) ─────────────
  # market-hub:
  #   build:
  #     context: ..
  #     dockerfile: deploy/Dockerfile.market-hub
  #   restart: unless-stopped
  #   networks: [backend]
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #   environment:
  #     REDIS_HOST: redis
  #     REDIS_PORT: 6379
  #     PORT:       8091
  #   ports:
  #     - "127.0.0.1:8091:8091"
