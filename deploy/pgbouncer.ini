# ─────────────────────────────────────────────────────────────
# PgBouncer — Bitrium Production Config
# ─────────────────────────────────────────────────────────────
# Deploy: /etc/pgbouncer/pgbouncer.ini
# App connects to: localhost:5432 (PgBouncer listens here)
# PgBouncer connects to PostgreSQL at POSTGRES_HOST:5433
# ─────────────────────────────────────────────────────────────

[databases]
# Format: dbname = host=<pg_host> port=<pg_port> dbname=<real_db>
bitrium = host=127.0.0.1 port=5432 dbname=bitrium

[pgbouncer]
# ── Network ──────────────────────────────────────────────────
listen_addr = 127.0.0.1
listen_port = 6432
unix_socket_dir = /var/run/postgresql

# ── Pool mode ────────────────────────────────────────────────
# transaction: connection released after each transaction (recommended)
pool_mode = transaction

# ── Pool sizing ──────────────────────────────────────────────
# max app connections per DB (1000 app conns → 100 real DB conns)
max_client_conn = 1000
default_pool_size = 100

# Reserve for admin queries
reserve_pool_size = 10
reserve_pool_timeout = 5

# ── Timeouts ─────────────────────────────────────────────────
server_idle_timeout = 600
client_idle_timeout = 0
server_connect_timeout = 15
query_timeout = 0

# ── Auth ─────────────────────────────────────────────────────
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# ── TLS (enable in production) ───────────────────────────────
# server_tls_sslmode = require
# server_tls_ca_file = /etc/ssl/certs/ca-certificates.crt

# ── Logging ──────────────────────────────────────────────────
logfile = /var/log/pgbouncer/pgbouncer.log
pidfile = /var/run/pgbouncer/pgbouncer.pid

log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

# ── Admin ────────────────────────────────────────────────────
admin_users = pgbouncer_admin
stats_users = pgbouncer_stats
