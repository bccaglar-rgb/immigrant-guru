# ──────────────────────────────────────────────────────────────
# Prometheus — Bitrium scrape config
# ──────────────────────────────────────────────────────────────
global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "bitrium-api"
    static_configs:
      - targets: ["api:8090"]
    metrics_path: /api/metrics
    scrape_interval: 15s
    scrape_timeout: 10s
